schemaVersion: 1
kind: sdkwork.course.capability.catalog
standardVersion: 2026-06-06
purpose: >
  Canonical SDKWork Course capability catalog. Capabilities declared here own
  course learning content, learning structure, author submissions, comments,
  reactions, and governance audit records.

capabilities:
  - id: course
    domain: content
    status: standardizing
    maturity: L3
    targetMaturity: L3
    priority: P0
    owner: sdkwork-course
    scope:
      - category
      - instructor
      - course
      - offering
      - section
      - lesson
      - resource_ref
      - live_session
      - enrollment
      - learning_progress
      - lesson_progress
      - comment
      - reaction
      - application
      - audit
    requiredLayers:
      - kind: contracts
        path: sdks/_shared/course-contracts
        manifest: package.json
      - kind: service
        path: crates/sdkwork-content-course-service
        manifest: Cargo.toml
      - kind: repository_sqlx
        path: crates/sdkwork-content-course-repository-sqlx
        manifest: Cargo.toml
      - kind: app_sdk
        path: sdks/sdkwork-course-app-sdk
        manifest: .sdkwork-assembly.json
      - kind: backend_sdk
        path: sdks/sdkwork-course-backend-sdk
        manifest: .sdkwork-assembly.json
    qualityGates:
      - category: contract
        command: pnpm run test:contracts
      - category: governance
        command: pnpm test
      - category: storage
        command: cargo test
    integration:
      sdkBoundary: generated-sdk-through-openapi
      appResponsibility: >
        Applications provide shell routes, visual composition, concrete media
        storage, and access adapters. Course records, learning structure, author
        submissions, moderation, progress, live sessions, and audit records
        remain owned by sdkwork-course.

