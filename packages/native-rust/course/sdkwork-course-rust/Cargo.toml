[package]
name = "sdkwork_course"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
description = "SDKWork course Rust domain, SQLx storage, migrations, and HTTP routers."

[lib]
path = "src/lib.rs"

[dependencies]
axum = "0.8"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlx = { version = "0.8.6", default-features = false, features = ["runtime-tokio", "sqlite", "postgres"] }

[dev-dependencies]
http-body-util = "0.1"
tokio = { version = "1.51", features = ["macros", "rt-multi-thread"] }
tower = { version = "0.5", features = ["util"] }

